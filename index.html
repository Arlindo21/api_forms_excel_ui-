<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form | Premium UI</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-page: #050609;
            --bg-form: #111319;
            --text-main: #e5e7eb;
            --text-sub: #9ca3af;
            --primary-accent: #8b5cf6;
            --primary-hover: #7c3aed;
            --border-color: #374151;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .form-container {
            background-color: var(--bg-form);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.1);
            width: 100%;
            max-width: 500px;
        }

        header { text-align: center; margin-bottom: 2rem; }

        header h1 { 
            font-size: 1.5rem; 
            background: linear-gradient(to right, #fff, var(--primary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .field-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 10px;
            color: var(--text-sub);
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input::placeholder { color: #6b7280; }

        input:focus {
            outline: none;
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .choice-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .choice-grid input[type="radio"] { display: none; }

        .choice-label {
            padding: 14px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .choice-label:hover {
            border-color: var(--primary-accent);
            background: rgba(139, 92, 246, 0.05);
        }

        input[type="radio"]:checked + .choice-label {
            background-color: var(--primary-accent);
            border-color: var(--primary-accent);
            color: white;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            font-weight: 600;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

<div class="form-container">
    <header>
        <h1>🚀 Feedback Stellar</h1>
        <p style="color: var(--text-sub); font-size: 0.9rem;">
            Sua experiência nos ajuda a orbitar melhor.
        </p>
    </header>

    <form 
        id="google-form"
        action="https://docs.google.com/forms/d/e/1FAIpQLSdmsYntgSONDMZHcO498pUQDvkhe4RE7RIdntbkDWjKWIpgIQ/formResponse"
        method="POST"
        target="hidden_iframe"
        onsubmit="submitted=true;">

        <div class="field-group">
            <label>NOME COMPLETO</label>
            <input type="text" name="entry.1726815172" placeholder="Como devemos te chamar?" required>
        </div>

        <div class="field-group">
            <label>SUA NOTA (0-10)</label>
            <input type="number" name="entry.1556844384" min="0" max="10" placeholder="8" required>
        </div>

        <div class="field-group">
            <label>DETALHE SUA EXPERIÊNCIA</label>
            <input type="text" name="entry.942555112" placeholder="Conte-nos mais...">
        </div>

        <div class="field-group">
            <label>VOCÊ INDICARIA?</label>
            <div class="choice-grid">
                <label><input type="radio" name="entry.1827570106" value="Sim" required><div class="choice-label">✨ Sim</div></label>
                <label><input type="radio" name="entry.1827570106" value="Com Certeza"><div class="choice-label">🔥 Com Certeza</div></label>
                <label><input type="radio" name="entry.1827570106" value="Talvez"><div class="choice-label">⚖️ Talvez</div></label>
                <label><input type="radio" name="entry.1827570106" value="Não"><div class="choice-label">❌ Não</div></label>
                <label><input type="radio" name="entry.1827570106" value="Não Indicaria"><div class="choice-label">🚫 Não Indicaria</div></label>
                <label><input type="radio" name="entry.1827570106" value="Apenas se melhorar"><div class="choice-label">🛠️ Se melhorar</div></label>
            </div>
        </div>

        <button type="submit" id="submit-btn">Enviar Transmissão</button>
    </form>
</div>

<script>var submitted = false;</script>

<iframe 
    name="hidden_iframe" 
    style="display:none;" 
    onload="if(submitted){showSuccess();}">
</iframe>

<script>
function showSuccess() {
    setTimeout(() => {
        document.getElementById('google-form').reset();
        const btn = document.getElementById('submit-btn');
        btn.innerText = "Enviado 🚀";
        btn.disabled = true;
    }, 500);
}

document.getElementById('google-form').addEventListener('submit', () => {
    const btn = document.getElementById('submit-btn');
    btn.innerText = 'Enviando...';
});
</script>

</body>
</html>
